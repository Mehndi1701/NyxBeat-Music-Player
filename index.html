<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NyxBeat Music Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    linear-gradient(135deg,#050816,#0f172a,#1e1b4b);
    min-height:100vh;
    color:white;
    padding:20px;
}

/* MAIN LAYOUT */

.container{
    display:grid;
    grid-template-columns:250px 1fr 320px;
    gap:20px;
    height:calc(100vh - 40px);
}

/* GLASS EFFECT */

.glass{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
}

/* SIDEBAR */

.sidebar{
    padding:25px;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:40px;
}

.logo-box{
    width:60px;
    height:60px;
    border-radius:18px;
    background:
    linear-gradient(135deg,#ff4fd8,#8f6bff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.menu-item{
    padding:15px;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.menu-item:hover{
    background:rgba(255,255,255,0.1);
}

/* PLAYER */

.player{
    padding:30px;
    text-align:center;
}

.player h1{
    margin-bottom:25px;
}

.music-image{
    width:300px;
    height:300px;
    border-radius:25px;
    object-fit:cover;
    box-shadow:0 0 25px rgba(255,79,216,0.5);
}

/* SONG INFO */

.song-info{
    margin-top:25px;
}

.song-info h2{
    font-size:35px;
}

.song-info p{
    color:#cccccc;
    margin-top:8px;
}

/* PROGRESS */

.progress{
    width:100%;
    margin-top:30px;
    cursor:pointer;
}

.time{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    color:#cccccc;
}

/* CONTROLS */

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    margin-top:40px;
}

.controls button{
    width:70px;
    height:70px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:24px;
    color:white;
    background:
    linear-gradient(135deg,#ff4fd8,#8f6bff);
    box-shadow:0 0 15px #ff4fd8;
    transition:0.3s;
}

.controls button:hover{
    transform:scale(1.1);
}

/* VOLUME */

.volume-box{
    margin-top:30px;
}

.volume-box input{
    width:100%;
}

/* PLAYLIST */

.playlist{
    padding:25px;
    overflow-y:auto;
}

.playlist h2{
    margin-bottom:20px;
}

.song{
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
}

.song:hover{
    background:rgba(255,255,255,0.12);
}

/* RESPONSIVE */

@media(max-width:1000px){

    .container{
        grid-template-columns:1fr;
        height:auto;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar glass">

        <div class="logo">

            <div class="logo-box">
                <i class="fa-solid fa-music"></i>
            </div>

            <div>
                <h1>NyxBeat</h1>
                <p>Music Player</p>
            </div>

        </div>

        <div class="menu">

            <div class="menu-item" id="homeBtn">
                <i class="fa-solid fa-house"></i>
                Home
            </div>

            <div class="menu-item" id="playlistBtn">
                <i class="fa-solid fa-music"></i>
                Playlist
            </div>

            <div class="menu-item" id="favBtn">
                <i class="fa-solid fa-heart"></i>
                Favorites
            </div>

            <div class="menu-item" id="settingsBtn">
                <i class="fa-solid fa-gear"></i>
                Settings
            </div>

        </div>

    </div>

    <!-- PLAYER -->

    <div class="player glass">

        <h1>Now Playing</h1>

        <img
        id="cover"
        class="music-image"
        src="https://picsum.photos/400">

        <div class="song-info">

            <h2 id="title">song1</h2>

            <p id="artist">Track One</p>

        </div>

        <!-- PROGRESS -->

        <input
        type="range"
        min="0"
        max="100"
        value="0"
        id="progress"
        class="progress">

        <div class="time">

            <span id="current">0:00</span>

            <span id="duration">0:00</span>

        </div>

        <!-- CONTROLS -->

        <div class="controls">

            <button id="prev">
                <i class="fa-solid fa-backward"></i>
            </button>

            <button id="play">
                <i class="fa-solid fa-play"></i>
            </button>

            <button id="next">
                <i class="fa-solid fa-forward"></i>
            </button>

        </div>

        <!-- VOLUME -->

        <div class="volume-box">

            <input
            type="range"
            min="0"
            max="100"
            value="70"
            id="volume">

        </div>

    </div>

    <!-- PLAYLIST -->

    <div class="playlist glass">

        <h2>Playlist</h2>

        <div class="song">song1.mp3</div>
        <div class="song">song2.mp3</div>
        <div class="song">song3.mp3</div>
        <div class="song">song4.mp3</div>
        <div class="song">song5.mp3</div>

    </div>

</div>

<audio id="audio"></audio>

<script>

/* ELEMENTS */

const audio =
document.getElementById("audio");

const playBtn =
document.getElementById("play");

const prevBtn =
document.getElementById("prev");

const nextBtn =
document.getElementById("next");

const progress =
document.getElementById("progress");

const volume =
document.getElementById("volume");

const title =
document.getElementById("title");

const artist =
document.getElementById("artist");

const cover =
document.getElementById("cover");

const current =
document.getElementById("current");

const duration =
document.getElementById("duration");

/* SIDEBAR BUTTONS */

const homeBtn =
document.getElementById("homeBtn");

const playlistBtn =
document.getElementById("playlistBtn");

const favBtn =
document.getElementById("favBtn");

const settingsBtn =
document.getElementById("settingsBtn");

/* SONGS */

const songs = [

{
    title:"song1",
    artist:"Track One",
    src:"songs/song1.mp3",
    cover:"https://picsum.photos/400?1"
},

{
    title:"song2",
    artist:"Track Two",
    src:"songs/song2.mp3",
    cover:"https://picsum.photos/400?2"
},

{
    title:"song3",
    artist:"Track Three",
    src:"songs/song3.mp3",
    cover:"https://picsum.photos/400?3"
},

{
    title:"song4",
    artist:"Track Four",
    src:"songs/song4.mp3",
    cover:"https://picsum.photos/400?4"
},

{
    title:"song5",
    artist:"Track Five",
    src:"songs/song5.mp3",
    cover:"https://picsum.photos/400?5"
}

];

let currentSong = 0;

let isPlaying = false;

/* LOAD SONG */

function loadSong(song){

    title.innerText = song.title;

    artist.innerText = song.artist;

    cover.src = song.cover;

    audio.src = song.src;
}

/* PLAY SONG */

function playSong(){

    audio.play();

    isPlaying = true;

    playBtn.innerHTML =
    '<i class="fa-solid fa-pause"></i>';
}

/* PAUSE SONG */

function pauseSong(){

    audio.pause();

    isPlaying = false;

    playBtn.innerHTML =
    '<i class="fa-solid fa-play"></i>';
}

/* PLAY BUTTON */

playBtn.addEventListener("click",()=>{

    if(isPlaying){
        pauseSong();
    }

    else{
        playSong();
    }

});

/* NEXT SONG */

nextBtn.addEventListener("click",()=>{

    currentSong++;

    if(currentSong > songs.length - 1){
        currentSong = 0;
    }

    loadSong(songs[currentSong]);

    playSong();

});

/* PREVIOUS SONG */

prevBtn.addEventListener("click",()=>{

    currentSong--;

    if(currentSong < 0){
        currentSong = songs.length - 1;
    }

    loadSong(songs[currentSong]);

    playSong();

});

/* UPDATE PROGRESS */

audio.addEventListener("timeupdate",()=>{

    const progressPercent =
    (audio.currentTime / audio.duration) * 100;

    progress.value = progressPercent;

    let minutes =
    Math.floor(audio.currentTime / 60);

    let seconds =
    Math.floor(audio.currentTime % 60);

    if(seconds < 10){
        seconds = "0" + seconds;
    }

    current.innerText =
    `${minutes}:${seconds}`;

});

/* DURATION */

audio.addEventListener("loadedmetadata",()=>{

    let minutes =
    Math.floor(audio.duration / 60);

    let seconds =
    Math.floor(audio.duration % 60);

    if(seconds < 10){
        seconds = "0" + seconds;
    }

    duration.innerText =
    `${minutes}:${seconds}`;

});

/* SEEK */

progress.addEventListener("input",()=>{

    audio.currentTime =
    (progress.value / 100) * audio.duration;

});

/* AUTO NEXT */

audio.addEventListener("ended",()=>{

    currentSong++;

    if(currentSong > songs.length - 1){
        currentSong = 0;
    }

    loadSong(songs[currentSong]);

    playSong();

});

/* VOLUME */

volume.addEventListener("input",()=>{

    audio.volume =
    volume.value / 100;

});

/* SIDEBAR BUTTONS */

homeBtn.addEventListener("click",()=>{

    alert("Welcome to NyxBeat Home");

});

playlistBtn.addEventListener("click",()=>{

    document.querySelector(".playlist")
    .scrollIntoView({
        behavior:"smooth"
    });

});

favBtn.addEventListener("click",()=>{

    alert("Favorites feature coming soon");

});

settingsBtn.addEventListener("click",()=>{

    alert("Settings panel coming soon");

});

/* INITIAL LOAD */

loadSong(songs[currentSong]);

audio.volume = 0.7;

</script>

</body>
</html>
